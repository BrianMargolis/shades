socket-path: "/tmp/theme-change.sock"
defaultLightTheme: "flexoki;light"
defaultDarkTheme: "fluoromachine;fluoromachine"
daemon:
  enabled-components:
    - "bat"
    - "btop"
    - "claude"
    - "firefox"
    - "fzf"
    - "ghostty"
    - "mac"
    - "tmux"
client:
  claude:
    use-ansi: true
  mac-wallpaper:
    dark: "/Users/brian/Pictures/loupe/loupe-mono-dark.heic"
    light: "/Users/brian/Pictures/loupe/loupe-mono-light.heic"
  ghostty:
    path: "~/.config/ghostty/ghostty-theme"
    shader-manager-light-off: "bloom"
    shader-manager-blur-light: false
    shader-manager-blur-dark: false
  fzf:
    # https://vitormv.github.io/fzf-themes/
    theme: >
      --color=fg:{FG},fg+:{YELLOW},bg:-1,bg+:{BG0}
      --color=hl:{YELLOW},hl+:{RED},info:{YELLOW},marker:{FG}
      --color=prompt:{GREEN},spinner:{YELLOW},pointer:{YELLOW},header:{YELLOW},label:{FG},query:{PURPLE}
      --border="none"
      --border-label=""
      --height="30%"
      --layout="reverse"
      --input-border="rounded"
      --info="hidden"
      --cycle
      --preview-window="border-rounded"
      --prompt="" --marker=" " --pointer=" " --separator="" --scrollbar=""
  firefox:
    theme-path: "~/dotfiles/browser/theme.css"
  tmux:
    status-bg: "{BG0}"
    status-fg: "{BG0}"
    window-status-format: "#[fg={BG0},bg={BG0}]#{?#{==:#{session_windows},1},,#[fg={FG},bg={BG0}]#W#{?#{>:#{window_panes},1},+,} [#I]}#[fg={BG0},bg={BG0}]"
    window-status-current-format: "#{?#{==:#{session_windows},1},,#[fg={ORANGE},bg={BG0}]#[fg={BG0},bg={ORANGE}]#W#{?#{>:#{window_panes},1},+,} [#I]#[fg={ORANGE},bg={BG0}]}"
    status-left: "#[fg={FG},bg={BG0}]\
      #[fg={BG0},bg={FG}]#S\
      #[fg={FG},bg={BG0}] "
    status-right: "#[fg={ORANGE},bg={BG0}]\
      #[fg={BG0},bg={ORANGE}]#(cd #{pane_current_path}; tmux-git-branch)\
      #[fg={PURPLE},bg={ORANGE}]\
      #[fg={BG0},bg={PURPLE}]#(cd #{pane_current_path}; pwd | sed -e \"s|^$HOME|~|\" | sed 's:\\([^/]\\)[^/]*/:\\1/:g') \
      #[fg={RED},bg={PURPLE}]\
      #[FG={BG0},bg={RED}]#(tmux-claude-usage five_hour --mtd) \
      #[fg={GREEN},bg={RED}]\
      #[FG={BG0},bg={GREEN}]#(spotify-now-playing) \
      #[fg={FG},bg={GREEN}]\
      #[fg={BG0},bg={FG}]#(date +\"%I:%M%p\" | tr '[:upper:]' '[:lower:]' | sed 's/^0//')#[fg={FG},bg={BG0}]"
    clock-mode-colour: "{ORANGE}"
  btop:
    theme-path: "~/.config/btop/themes"
    btop-config-path: "~/dotfiles/btop/btop.conf"
